<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB 模型验收页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1d23; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; color: #e6e6e6; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .panel {
    position: fixed;
    background: rgba(28, 32, 40, 0.88);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
  }

  /* 左上：模型切换 */
  #controls { top: 16px; left: 16px; width: 220px; }
  #controls h2 { font-size: 14px; margin-bottom: 10px; color: #8ab4ff; font-weight: 600; }
  .model-btn {
    display: block; width: 100%; text-align: left;
    margin-bottom: 6px; padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; color: #ddd; cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .model-btn:hover { background: rgba(138,180,255,0.15); border-color: rgba(138,180,255,0.4); }
  .model-btn.active { background: rgba(138,180,255,0.25); border-color: #8ab4ff; color: #fff; font-weight: 600; }

  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .toggle-row label { cursor: pointer; user-select: none; }
  .toggle-row input { cursor: pointer; width: 16px; height: 16px; }

  /* 右上：信息面板 */
  #info { top: 16px; right: 16px; width: 300px; font-family: "Consolas", "Courier New", monospace; font-size: 12px; }
  #info h2 { font-size: 14px; margin-bottom: 10px; color: #8ab4ff; font-weight: 600; font-family: "Segoe UI", sans-serif; }
  .info-row { display: flex; justify-content: space-between; gap: 8px; }
  .info-row .k { color: #9aa3b2; white-space: nowrap; }
  .info-row .v { color: #e6e6e6; text-align: right; word-break: break-word; }
  .info-section { margin-bottom: 8px; }
  .info-section .title { color: #ffcb6b; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }

  /* 底部提示 */
  #hint { bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #9aa3b2; padding: 8px 16px; }

  /* loading */
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(26,29,35,0.6); font-size: 15px; color: #8ab4ff; z-index: 10;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  #loading.show { opacity: 1; }
</style>
</head>
<body>
<div id="app"></div>

<div id="controls" class="panel">
  <h2>模型切换</h2>
  <div id="model-buttons"></div>
  <div class="divider"></div>
  <div class="toggle-row"><label for="t-rotate">自动旋转</label><input type="checkbox" id="t-rotate" checked></div>
  <div class="toggle-row"><label for="t-wire">线框模式</label><input type="checkbox" id="t-wire"></div>
  <div class="toggle-row"><label for="t-axes">坐标轴</label><input type="checkbox" id="t-axes" checked></div>
  <div class="toggle-row"><label for="t-grid">地面网格</label><input type="checkbox" id="t-grid" checked></div>
  <div class="toggle-row"><label for="t-box">包围盒</label><input type="checkbox" id="t-box"></div>
</div>

<div id="info" class="panel">
  <h2>模型信息</h2>
  <div class="info-section">
    <div class="title">原始包围盒尺寸 (模型单位)</div>
    <div class="info-row"><span class="k">X (宽)</span><span class="v" id="size-x">-</span></div>
    <div class="info-row"><span class="k">Y (高)</span><span class="v" id="size-y">-</span></div>
    <div class="info-row"><span class="k">Z (深)</span><span class="v" id="size-z">-</span></div>
  </div>
  <div class="info-section">
    <div class="title">原始中心点</div>
    <div class="info-row"><span class="k">center</span><span class="v" id="center">-</span></div>
  </div>
  <div class="info-section">
    <div class="title">几何统计</div>
    <div class="info-row"><span class="k">三角面</span><span class="v" id="tris">-</span></div>
    <div class="info-row"><span class="k">顶点</span><span class="v" id="verts">-</span></div>
    <div class="info-row"><span class="k">Mesh 数</span><span class="v" id="meshes">-</span></div>
  </div>
  <div class="info-section">
    <div class="title">材质 / 贴图</div>
    <div class="info-row"><span class="k">材质类型</span><span class="v" id="mat-type">-</span></div>
    <div class="info-row"><span class="k">贴图通道</span><span class="v" id="mat-maps">-</span></div>
  </div>
  <div class="info-section">
    <div class="title">显示状态</div>
    <div class="info-row"><span class="k">归一化缩放</span><span class="v" id="norm-scale">-</span></div>
    <div class="info-row"><span class="k">相机距离</span><span class="v" id="cam-dist">-</span></div>
  </div>
</div>

<div id="hint" class="panel">左键拖拽旋转 · 滚轮缩放 · 右键平移 &nbsp;|&nbsp; 验收检查：方向是否正、比例是否合理、螺栓是否<b>全螺纹</b>、材质贴图是否正常</div>

<div id="loading"><span id="loading-text">加载中…</span></div>

<script src="lib/three.min.js"></script>
<script src="lib/OrbitControls.js"></script>
<script src="lib/GLTFLoader.js"></script>
<script>
const MODELS = [
  { id: 'bolt',   name: '六角螺栓',   path: 'models/optimized_fast/hex_bolt.glb' },
  { id: 'nut',    name: '六角螺母',   path: 'models/optimized_fast/hex_nut.glb' },
  { id: 'flat',   name: '平垫圈',     path: 'models/optimized_fast/flat_washer.glb' },
  { id: 'spring', name: '弹簧垫圈',   path: 'models/optimized_fast/spring_washer.glb' },
  { id: 'serr',   name: '锯齿垫圈',   path: 'models/optimized_fast/serrated_washer.glb' },
];

const TARGET_SIZE = 2.0; // 归一化目标尺寸（最长边）

let scene, camera, renderer, controls;
let gridHelper, axesHelper;
let currentRoot = null;      // 当前模型外层 group（已归一化、居中）
let currentBoxHelper = null;
let autoRotate = true;
let wireframe = false;

const loader = new THREE.GLTFLoader();
const cache = {}; // id -> gltf.scene (原始)

init();
animate();
selectModel('bolt');

function init() {
  const app = document.getElementById('app');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1d23);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(3, 2.5, 4);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.physicallyCorrectLights = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  app.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  // 灯光：半球光打底 + 主方向光 + 补光，金属件更立体
  const hemi = new THREE.HemisphereLight(0xffffff, 0x404040, 0.9);
  scene.add(hemi);
  const key = new THREE.DirectionalLight(0xffffff, 2.0);
  key.position.set(5, 8, 6);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xbcd4ff, 0.8);
  fill.position.set(-6, 3, -4);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffffff, 0.6);
  rim.position.set(0, -4, -6);
  scene.add(rim);

  // 用 PMREM 生成一个简单环境贴图，让 PBR 金属反射有内容
  const pmrem = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0x888c94);
  const envTex = pmrem.fromScene(envScene, 0.04).texture;
  scene.environment = envTex;

  gridHelper = new THREE.GridHelper(10, 20, 0x444a55, 0x2a2f38);
  scene.add(gridHelper);
  axesHelper = new THREE.AxesHelper(1.5); // 红=X 绿=Y 蓝=Z
  scene.add(axesHelper);

  buildModelButtons();
  bindToggles();
  window.addEventListener('resize', onResize);
}

function buildModelButtons() {
  const wrap = document.getElementById('model-buttons');
  MODELS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'model-btn';
    btn.textContent = m.name;
    btn.dataset.id = m.id;
    btn.onclick = () => selectModel(m.id);
    wrap.appendChild(btn);
  });
}

function bindToggles() {
  document.getElementById('t-rotate').onchange = e => autoRotate = e.target.checked;
  document.getElementById('t-grid').onchange = e => gridHelper.visible = e.target.checked;
  document.getElementById('t-axes').onchange = e => axesHelper.visible = e.target.checked;
  document.getElementById('t-wire').onchange = e => { wireframe = e.target.checked; applyWireframe(); };
  document.getElementById('t-box').onchange = e => { if (currentBoxHelper) currentBoxHelper.visible = e.target.checked; };
}

function showLoading(show, text) {
  const el = document.getElementById('loading');
  if (text) document.getElementById('loading-text').textContent = text;
  el.classList.toggle('show', show);
}

function selectModel(id) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  const model = MODELS.find(m => m.id === id);
  if (!model) return;

  if (cache[id]) { mountModel(cache[id], model); return; }

  showLoading(true, '加载 ' + model.name + ' …');
  loader.load(model.path, gltf => {
    cache[id] = gltf.scene;
    showLoading(false);
    mountModel(gltf.scene, model);
  }, undefined, err => {
    showLoading(false);
    console.error('加载失败', model.path, err);
    alert('加载失败：' + model.path + '\n' + err);
  });
}

function mountModel(rawScene, model) {
  // 清掉旧的
  if (currentRoot) { scene.remove(currentRoot); }
  if (currentBoxHelper) { scene.remove(currentBoxHelper); currentBoxHelper = null; }

  const obj = rawScene.clone(true);

  // —— 先量原始包围盒（归一化前）——
  const rawBox = new THREE.Box3().setFromObject(obj);
  const rawSize = rawBox.getSize(new THREE.Vector3());
  const rawCenter = rawBox.getCenter(new THREE.Vector3());

  // —— 归一化：居中 + 缩放到 TARGET_SIZE ——
  const maxDim = Math.max(rawSize.x, rawSize.y, rawSize.z) || 1;
  const normScale = TARGET_SIZE / maxDim;

  const root = new THREE.Group();
  obj.position.sub(rawCenter);          // 居中到原点
  const inner = new THREE.Group();
  inner.add(obj);
  inner.scale.setScalar(normScale);     // 整体缩放
  root.add(inner);
  scene.add(root);
  currentRoot = root;

  // 包围盒辅助（基于归一化后）
  const boxHelper = new THREE.Box3Helper(new THREE.Box3().setFromObject(root), 0xffcb6b);
  boxHelper.visible = document.getElementById('t-box').checked;
  scene.add(boxHelper);
  currentBoxHelper = boxHelper;

  applyWireframe();

  // 把相机/控制器目标对准模型中心（原点）
  controls.target.set(0, 0, 0);

  updateInfo(model, rawSize, rawCenter, normScale, obj);
}

function applyWireframe() {
  if (!currentRoot) return;
  currentRoot.traverse(o => {
    if (o.isMesh && o.material) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach(mat => { mat.wireframe = wireframe; });
    }
  });
}

function updateInfo(model, size, center, normScale, obj) {
  document.getElementById('size-x').textContent = size.x.toFixed(4);
  document.getElementById('size-y').textContent = size.y.toFixed(4);
  document.getElementById('size-z').textContent = size.z.toFixed(4);
  document.getElementById('center').textContent =
    `(${center.x.toFixed(3)}, ${center.y.toFixed(3)}, ${center.z.toFixed(3)})`;
  document.getElementById('norm-scale').textContent = normScale.toFixed(4) + ' ×';

  // 几何统计 + 材质
  let tris = 0, verts = 0, meshCount = 0;
  const matTypes = new Set();
  const mapKinds = new Set();
  obj.traverse(o => {
    if (o.isMesh && o.geometry) {
      meshCount++;
      const g = o.geometry;
      const pos = g.attributes.position;
      if (pos) verts += pos.count;
      if (g.index) tris += g.index.count / 3;
      else if (pos) tris += pos.count / 3;

      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach(mat => {
        if (!mat) return;
        matTypes.add(mat.type);
        ['map','normalMap','roughnessMap','metalnessMap','aoMap','emissiveMap'].forEach(k => {
          if (mat[k]) mapKinds.add(k.replace('Map',''));
        });
      });
    }
  });
  document.getElementById('tris').textContent = Math.round(tris).toLocaleString();
  document.getElementById('verts').textContent = verts.toLocaleString();
  document.getElementById('meshes').textContent = meshCount;
  document.getElementById('mat-type').textContent = [...matTypes].join(', ') || '-';
  document.getElementById('mat-maps').textContent = mapKinds.size ? [...mapKinds].join(', ') : '无';
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  if (autoRotate && currentRoot) currentRoot.rotation.y += 0.005;
  controls.update();
  document.getElementById('cam-dist').textContent = camera.position.distanceTo(controls.target).toFixed(2);
  renderer.render(scene, camera);
}
</script>
</body>
</html>
